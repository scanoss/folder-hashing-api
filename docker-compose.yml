version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: scanoss-qdrant
    ports:
      - "6333:6333" # HTTP API port
      - "6334:6334" # gRPC API port (used by our Go client)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      # Enable all CORS origins for development
      - QDRANT__SERVICE__HTTP_CORS_ENABLED=true
      # Log level
      - QDRANT__LOG_LEVEL=INFO
      # Performance optimizations
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=32
      - QDRANT__SERVICE__GRPC_TIMEOUT_MS=60000
    healthcheck:
      test:
        ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  qdrant_data:
    driver: local

