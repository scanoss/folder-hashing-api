version: "3.8"

services:
  hfh-api:
    environment:
      # Production-specific settings
      - APP_MODE=production
      - APP_DEBUG=false
      - APP_TRACE=false
      # Disable telemetry by default in production
      - OTEL_ENABLED=false
    # Production restart policy
    restart: unless-stopped
    # Remove source code mount for production
    volumes:
      - ./config:/app/config:ro # Config files
      - ./snapshots:/app/snapshots # For import/export operations
      - hfh_logs:/var/log/scanoss # Persistent logs

  qdrant:
    environment:
      # Production logging level
      - QDRANT__LOG_LEVEL=INFO
      # Production performance settings
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=64
      - QDRANT__SERVICE__GRPC_TIMEOUT_MS=120000
    # Production restart policy
    restart: unless-stopped
