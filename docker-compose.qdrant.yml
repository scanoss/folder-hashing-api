services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: scanoss-qdrant
    ports:
      - 6333:6333 # HTTP API port
      - 6334:6334 # gRPC API port (used by our Go client)
    volumes:
      - ./qdrant_data:/qdrant/storage
    expose:
      - 6333
      - 6334
      - 6335
    restart: unless-stopped
    networks:
      - scanoss-network

volumes:
  qdrant_data:
    driver: local

networks:
  scanoss-network:
    driver: bridge
